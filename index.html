<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HtmlChat v1.0</title>
<style>
  body {
    margin: 0;
    background: #f0f0f0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #nameScreen {
    position: absolute;
    inset: 0;
    background: #e0e0e0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 12px;
  }

  #chatUI {
    display: none;
    flex: 1;
    flex-direction: column;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .msg {
    background: white;
    padding: 6px 10px;
    margin: 4px 0;
    border-radius: 4px;
    box-shadow: 0 0 3px rgba(0,0,0,0.2);
    max-width: 80%;
    white-space: pre-wrap;
  }

  #inputArea {
    display: flex;
    padding: 10px;
    background: #ddd;
  }

  #text {
    flex: 1;
    padding: 8px;
    font-size: 16px;
  }

  #sendBtn {
    padding: 8px 14px;
    margin-left: 8px;
    font-size: 16px;
  }
</style>
</head>
<body>

<div id="nameScreen">
  <h2>Enter your name</h2>
  <input id="nameInput" type="text" placeholder="Your name">
  <button id="nameBtn">Continue</button>
</div>

<div id="chatUI">
  <div id="messages"></div>

  <div id="inputArea">
    <input id="text" type="text" placeholder="Type a message...">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, set, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDvyUQYW5M6OUdAvw1YF6ZKD7poebPT9xY",
    authDomain: "roblox-chat-sucks.firebaseapp.com",
    databaseURL: "https://roblox-chat-sucks-default-rtdb.firebaseio.com",
    projectId: "roblox-chat-sucks",
    storageBucket: "roblox-chat-sucks.firebasestorage.app",
    messagingSenderId: "1848720764",
    appId: "1:1848720764:web:a870096209c2d59f80b8f9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, "messages");

  let username = null;

  const nameScreen = document.getElementById("nameScreen");
  const nameInput = document.getElementById("nameInput");
  const nameBtn = document.getElementById("nameBtn");

  const chatUI = document.getElementById("chatUI");
  const messagesDiv = document.getElementById("messages");
  const textInput = document.getElementById("text");
  const sendBtn = document.getElementById("sendBtn");

  function enterName() {
    const name = nameInput.value.trim();
    if (name === "") return;
    username = name;
    nameScreen.style.display = "none";
    chatUI.style.display = "flex";
  }

  nameBtn.onclick = enterName;
  nameInput.addEventListener("keydown", e => {
    if (e.key === "Enter") enterName();
  });

  function addMessage(text) {
    const msg = document.createElement("div");
    msg.className = "msg";
    msg.textContent = text;
    messagesDiv.appendChild(msg);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    setTimeout(() => msg.remove(), 10000);
  }

  function send() {
    const text = textInput.value.trim();
    if (text === "") return;
    const msgRef = push(messagesRef);
    set(msgRef, {
      name: username,
      text: text,
      timestamp: Date.now()
    });
    textInput.value = "";
    textInput.blur();
  }

  sendBtn.onclick = send;

  textInput.addEventListener("keydown", e => {
    if (e.key === "Enter") send();
  });

  document.addEventListener("keydown", e => {
    if (e.key === "/" && document.activeElement !== textInput) {
      e.preventDefault();
      textInput.focus();
    }
  });

  onChildAdded(messagesRef, snapshot => {
    const msg = snapshot.val();
    addMessage(msg.name + ": " + msg.text);
  });
</script>

</body>
</html>
