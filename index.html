

 older="Your name">
  <button id="nameBtn">Continue</button>
</div>

<div id="chatUI">
  <div id="messages"></div>

  <div id="inputArea">
    <input id="text" type="text" placeholder="Type a message...">
    <button id="sendBtn">Send</button>
  </div>

  <button id="modeToggle">\u263E</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, set, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDvyUQYW5M6OUdAvw1YF6ZKD7poebPT9xY",
    authDomain: "roblox-chat-sucks.firebaseapp.com",
    databaseURL: "https://roblox-chat-sucks-default-rtdb.firebaseio.com",
    projectId: "roblox-chat-sucks",
    storageBucket: "roblox-chat-sucks.firebasestorage.app",
    messagingSenderId: "1848720764",
    appId: "1:1848720764:web:a870096209c2d59f80b8f9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, "messages");

  let username = null;

  const nameScreen = document.getElementById("nameScreen");
  const nameInput = document.getElementById("nameInput");
  const nameBtn = document.getElementById("nameBtn");
  const chatUI = document.getElementById("chatUI");
  const messagesDiv = document.getElementById("messages");
  const textInput = document.getElementById("text");
  const sendBtn = document.getElementById("sendBtn");
  const modeToggle = document.getElementById("modeToggle");

  function containsNumberAboveThree(text) {
    return /[4-9]/.test(text);
  }

  function filterMessage(text) {
    if (containsNumberAboveThree(text)) {
      return "[Content Deleted BROSKI]";
    }
    return text;
  }

  function enterName() {
    const name = nameInput.value.trim();
    if (name === "") return;
    username = name;
    nameScreen.style.display = "none";
    chatUI.style.display = "flex";
  }

  nameBtn.onclick = enterName;
  nameInput.addEventListener("keydown", e => {
    if (e.key === "Enter") enterName();
  });

  function addMessage(text, name, key) {
    const msg = document.createElement("div");
    msg.className = "msg";

    const nameSpan = document.createElement("span");
    nameSpan.className = "username";
    nameSpan.textContent = name + ": ";

    const textSpan = document.createElement("span");
    textSpan.textContent = text;

    msg.appendChild(nameSpan);
    msg.appendChild(textSpan);

    messagesDiv.appendChild(msg);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    setTimeout(() => {
      msg.remove();
      remove(ref(db, "messages/" + key));
    }, 10000);
  }

  async function send() {
    const text = textInput.value.trim();
    if (text === "") return;

    const finalText = filterMessage(text);

    const msgRef = push(messagesRef);
    set(msgRef, {
      name: username,
      text: finalText,
      timestamp: Date.now()
    });

    textInput.value = "";
    textInput.blur();
  }

  sendBtn.onclick = send;

  textInput.addEventListener("keydown", e => {
    if (e.key === "Enter") send();
  });

  document.addEventListener("keydown", e => {
    if (e.key === "/" && document.activeElement !== textInput) {
      e.preventDefault();
      textInput.focus();
    }
  });

  onChildAdded(messagesRef, snapshot => {
    const msg = snapshot.val();
    addMessage(msg.text, msg.name, snapshot.key);
  });

  modeToggle.onclick = () => {
    document.body.classList.toggle("inverted");
    modeToggle.textContent =
      document.body.classList.contains("inverted") ? "\u2600\uFE0F" : "\u263E";
  };
</script>

</body>
</html>
